version: '3.8'
services:
  app:
    image: ivangavrilin/rss-rest-service:latest
    env_file: .env
    ports:
      - '${PORT:-4000}:${PORT:-4000}'
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:15-alpine
    env_file: .env
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
